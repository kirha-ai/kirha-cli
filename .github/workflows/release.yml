name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries and npm bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Build npm bundle
        run: bun run build

      - name: Cross-compile binaries
        run: bun run build:binaries

      - name: Verify binaries exist
        run: |
          ls -lh dist/binaries/
          test -f dist/binaries/kirha-darwin-arm64
          test -f dist/binaries/kirha-darwin-x64
          test -f dist/binaries/kirha-linux-x64
          test -f dist/binaries/kirha-linux-arm64

      - name: Generate SHA256 checksums
        working-directory: dist/binaries
        run: |
          sha256sum kirha-darwin-arm64 kirha-darwin-x64 kirha-linux-x64 kirha-linux-arm64 > checksums.txt
          cat checksums.txt

      - name: Upload npm bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-bundle
          path: dist/kirha.js
          retention-days: 1

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/binaries/
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/binaries/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/binaries/kirha-darwin-arm64
            dist/binaries/kirha-darwin-x64
            dist/binaries/kirha-linux-x64
            dist/binaries/kirha-linux-arm64
            dist/binaries/checksums.txt

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download npm bundle
        uses: actions/download-artifact@v4
        with:
          name: npm-bundle
          path: dist/

      - name: Verify bundle is present
        run: test -f dist/kirha.js

      - name: Dry run
        run: npm publish --dry-run --access public --ignore-scripts

      - name: Publish
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
